
<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="refresh" content="0; URL=quiz">
</head>
<body>


<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding-top:60px;
}
h1{
color:red;
text-shadow:0 0 20px red;
}
.box{
background:#111;
border:3px solid red;
padding:30px;
width:400px;
margin:auto;
box-shadow:0 0 25px red;
}
input,select{
width:90%;
padding:10px;
margin:8px;
background:black;
color:white;
border:2px solid red;
}
button{
background:red;
color:white;
padding:10px 20px;
border:none;
cursor:pointer;
}
#timer{
font-size:30px;
color:red;
}
</style>

</head>

<body>

<h1>⚡ Math Quiz Game ⚡</h1>

<div id="start" class="box">

Player 1 Name:<br>
<input type="text" id="p1"><br><br>

Player 2 Name:<br>
<input type="text" id="p2"><br><br>

Mode:<br>
<select id="mode">
<option value="multi">Multiplayer</option>
<option value="computer">Play with Computer</option>
</select>

<br><br>

Difficulty:<br>
<select id="level">
<option value="1">Easy</option>
<option value="2">Medium</option>
<option value="3">Hard</option>
</select>

<br><br>

<button onclick="startGame()">Start Quiz</button>

</div>

<div id="quiz" class="box" style="display:none;">

<h2 id="timer">10</h2>
<h2 id="question"></h2>

<input type="number" id="a1" placeholder="Player 1 Answer"><br>
<input type="number" id="a2" placeholder="Player 2 Answer"><br>

<button onclick="submitAnswer()">Submit</button>

</div>

<div id="result" class="box" style="display:none;">
<h2 id="winner"></h2>
<h3 id="score"></h3>
</div>

<script>

let questions=[], answers=[];
let index=0, score1=0, score2=0;
let p1,p2,mode;
let timer;
let timeLeft=10;
let t1=100, t2=100;

// START
function startGame(){
p1=document.getElementById("p1").value;
p2=document.getElementById("p2").value;
mode=document.getElementById("mode").value;

if(mode==="computer") p2="Computer";

let level=document.getElementById("level").value;

if(level==1){
questions=["5+3=?","9+7=?","12-5=?","4*3=?","20/4=?"];
answers=[8,16,7,12,5];
}
else if(level==2){
questions=["5+5*4=?","12*3-6=?","50/5+7=?","18+6*2=?","30-4*5=?"];
answers=[25,30,17,30,10];
}
else{
questions=["25*4-10=?","36/3+15*2=?","125/5+20=?","(15+5)*3=?","50-10*3+20=?"];
answers=[90,42,45,60,40];
}

document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";

showQuestion();
}

// QUESTION
function showQuestion(){

if(index>=questions.length){
showResult();
return;
}

document.getElementById("question").innerText=questions[index];

timeLeft=10;
t1=100; t2=100;

timer=setInterval(()=>{
document.getElementById("timer").innerText=timeLeft;
timeLeft--;

if(timeLeft<0){
clearInterval(timer);
submitAnswer();
}
},1000);

// track speed
document.getElementById("a1").onchange=()=>{ if(t1==100) t1=10-timeLeft; }
document.getElementById("a2").onchange=()=>{ if(t2==100) t2=10-timeLeft; }

}

// SUBMIT
function submitAnswer(){

clearInterval(timer);

let a1=parseInt(document.getElementById("a1").value)||-1;
let a2=parseInt(document.getElementById("a2").value)||-1;

let correct=answers[index];

// multiplayer logic
if(mode==="multi"){

if(a1!=a2){
if(a1==correct) score1++;
if(a2==correct) score2++;
}
else{
if(a1==correct){
if(t1<t2) score1++;
else if(t2<t1) score2++;
}
}

}

// computer logic
else{

let comp = Math.random()<0.7 ? correct : Math.floor(Math.random()*50);

if(a1==correct) score1++;
if(comp==correct) score2++;

}

index++;

document.getElementById("a1").value="";
document.getElementById("a2").value="";

showQuestion();
}

// RESULT
function showResult(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

let win="It's a Tie!";
if(score1>score2) win=p1+" Wins!";
else if(score2>score1) win=p2+" Wins!";

document.getElementById("winner").innerText=win;
document.getElementById("score").innerText=
p1+": "+score1+" | "+p2+": "+score2;

}

</script>

</body>
</html>
